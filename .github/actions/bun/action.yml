name: 'Setup Bun'
description: 'Setup Bun and install dependencies'
inputs:
  working-directory:
    description:
      'The directory to install dependencies in (if install-paths is empty)'
    required: false
    default: '.'
  install-paths:
    description:
      'Newline-separated paths to install dependencies in, relative to the
      workspace root'
    required: false
    default: ''
  install-args:
    description: 'Newline-separated Bun install arguments'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2.2.0
      with:
        bun-version: latest

    - name: Install dependencies
      shell: bash
      env:
        ACTION_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        ACTION_INSTALL_PATHS: ${{ inputs.install-paths }}
        ACTION_INSTALL_ARGS: ${{ inputs.install-args }}
      run: |
        set -euo pipefail

        # Cross-platform realpath replacement that handles non-existent paths
        realpath_m() {
          local path="$1"
          if [[ -e "$path" ]]; then
            realpath "$path"
          else
            # Walk up until we find an existing ancestor, accumulating missing suffix
            local suffix=""
            local current="$path"
            while [[ ! -e "$current" && "$current" != "/" && "$current" != "." ]]; do
              suffix="/$(basename "$current")$suffix"
              current="$(dirname "$current")"
            done
            local resolved
            if [[ -e "$current" ]]; then
              resolved="$(realpath "$current")"
            else
              resolved="$(pwd -P)"
            fi
            echo "${resolved}${suffix}"
          fi
        }

        workspace_root="$(realpath_m "$GITHUB_WORKSPACE")"
        actions_root="$(realpath_m "$workspace_root/../../_actions")"
        install_paths=()
        install_args=()

        while IFS= read -r raw_path; do
          trimmed_path="${raw_path#"${raw_path%%[![:space:]]*}"}"
          trimmed_path="${trimmed_path%"${trimmed_path##*[![:space:]]}"}"

          if [[ -z "$trimmed_path" ]]; then
            continue
          fi

          install_paths+=("$trimmed_path")
        done <<< "$ACTION_INSTALL_PATHS"

        while IFS= read -r raw_arg; do
          trimmed_arg="${raw_arg#"${raw_arg%%[![:space:]]*}"}"
          trimmed_arg="${trimmed_arg%"${trimmed_arg##*[![:space:]]}"}"

          if [[ -z "$trimmed_arg" ]]; then
            continue
          fi

          install_args+=("$trimmed_arg")
        done <<< "$ACTION_INSTALL_ARGS"

        if [[ "${#install_paths[@]}" -eq 0 ]]; then
          install_paths+=("$ACTION_WORKING_DIRECTORY")
        fi

        for install_path in "${install_paths[@]}"; do
          if [[ "$install_path" = /* ]]; then
            resolved_path="$(realpath_m "$install_path")"
          else
            resolved_path="$(realpath_m "$workspace_root/$install_path")"
          fi

          case "$resolved_path" in
            "$workspace_root"|"$workspace_root"/*|"$actions_root"|"$actions_root"/*) ;;
            *)
              echo "Install path escapes workspace: $install_path" >&2
              exit 1
              ;;
          esac

          (
            cd "$resolved_path"
            bun install "${install_args[@]}"
          )
        done
