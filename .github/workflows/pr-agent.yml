name: PR Agent (Vertex AI)

on:
  pull_request:
    types:
      [
        'opened',
        'reopened',
        'ready_for_review',
        'review_requested',
        'synchronize',
      ]
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      vertex_project:
        type: string
        default: 'amina-440220'
        required: false
        description: 'Google Cloud Project ID'
      vertex_location:
        type: string
        default: 'global'
        required: false
        description: 'Vertex AI Region/Location'
    secrets:
      GCP_CREDENTIALS:
        required: true
        description: 'Google Cloud Service Account JSON Key'

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    if:
      ${{ (github.event_name == 'pull_request' ||
      github.event.issue.pull_request) && github.actor != 'github-actions[bot]'
      && !contains(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      # Step 1: Authenticate to Google Cloud using Service Account JSON Key
      - name: Authenticate to Google Cloud (Vertex AI)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          create_credentials_file: false

      # Step-2: Run PR Agent Action
      - name: PR Agent action step
        uses: The-PR-Agent/pr-agent@v0.36.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vertex AI Configs (passed to LiteLLM)
          VERTEXAI_PROJECT: ${{ inputs.vertex_project || 'amina-440220' }}
          VERTEXAI_LOCATION: ${{ inputs.vertex_location || 'global' }}
          # Tell PR-Agent where to find central config
          CONFIG__EXTRA_CONFIG_URL: 'https://raw.githubusercontent.com/iamvikshan/.github/main/configs/.pr_agent.toml'
