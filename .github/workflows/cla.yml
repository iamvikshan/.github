name: 'CLA Assistant'
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
  workflow_dispatch:
  workflow_call:
    inputs:
      path-to-document:
        type: string
        required: false
      remote-organization-name:
        type: string
        required: false
        default: 'iamvikshan'
        description:
          'Remote organization/owner name where signatures are stored'
      remote-repository-name:
        type: string
        required: false
        default: '.github'
        description: 'Remote repository name where signatures are stored'
    secrets:
      token:
        description:
          'Optional GitHub token or PAT used to write signatures to a different
          repository/workspace.'
        required: false

# permissions:
#   actions: write
#   contents: write
#   pull-requests: write
#   statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: 'CLA Assistant'
        if:
          (github.event.comment.body == 'recheck' || github.event.comment.body
          == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target' || github.event_name ==
          'workflow_call'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN:
            ${{ secrets.token || secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.token || secrets.GH_TOKEN || '' }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document:
            ${{ inputs.path-to-document ||
            format('https://github.com/{0}/.github/blob/main/.github/CLA.md',
            github.repository_owner) }}
          branch: 'main'
          allowlist: dependabot-preview[bot], dependabot[bot], *bot, bot*
          create-file-commit-message:
            'chore: create file for storing CLA signatures'
          signed-commit-message:
            'chore: @$contributorName has signed the CLA in #$pullRequestNo'
          custom-notsigned-prcomment:
            'Thanks for your submission! We ask that $you sign our [Contributor
            License Agreement](https://github.com/${{ github.repository_owner
            }}/.github/blob/main/.github/CLA.md) before we can accept your
            contribution. You can sign the CLA by adding a comment below using
            this text:'
          custom-allsigned-prcomment: '✍️ All contributors have signed the CLA'
          remote-organization-name: ${{ inputs.remote-organization-name }}
          remote-repository-name: ${{ inputs.remote-repository-name }}
